[database]
host = localhost
port = 3306
user = NQI_Server
password = nqiserver
database = nqi_system
pool_size = 20
max_overflow = 40
pool_timeout = 10
pool_recycle = 1800

[server]
host = 0.0.0.0
port = 8000
upload_dir = ./uploads
max_file_size = 104857600
allowed_extensions = .xlsx,.xls,.jpg,.jpeg,.png,.bmp

[security]
secret_key = NQI_PROJECT_DQY
algorithm = HS256
access_token_expire_minutes = 30

[logging]
log_dir = ./logs
log_level = INFO
log_rotation = 10 MB
log_retention = 30 days

[three_phase_meter]
# 三相表专用配置
excel_compression_enabled = false
image_compression_enabled = true
image_quality = 85
image_max_size = 1048576

[processing]
# Background parsing worker health and retry settings (seconds).
poll_interval = 0.2
supervisor_interval = 5
heartbeat_timeout = 120
error_backoff_max = 30
status_log_interval = 60

